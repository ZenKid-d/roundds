name: roundds
description: "Roundds — единый плеер музыки из разных источников (YouTube Music, SoundCloud, Яндекс Музыка, VK Музыка)."
publish_to: "none"
version: 2.1.18+47

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any # версию диктует flutter_localizations из текущего Flutter SDK

  # State
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Audio playback (in-app player + background/notification)
  just_audio: ^0.9.40
  audio_service: ^0.18.15

  # Dynamic accent from artwork.
  # ВНИМАНИЕ: пакет объявлен discontinued (обновлений не будет), но рабочий.
  # Замена изменит подбор акцента — трогаем только при реальной поломке.
  palette_generator: ^0.3.3+3

  # Geometric font
  google_fonts: ^6.2.1

  # Networking / parsing
  dio: ^5.5.0+1
  crypto: ^3.0.3
  html: ^0.15.4
  # Нужен напрямую: DoH-обход подсовывает свой http-клиент в youtube_explode.
  http: ^1.1.0

  # Images
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.4.1

  # Brand icons (логотипы сервисов)
  font_awesome_flutter: ^11.0.0

  # Вход в Google для импорта лайков YouTube Music (официальный YouTube Data API)
  google_sign_in: ^6.2.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  googleapis: ^13.2.0

  # Sources
  youtube_explode_dart: ^2.5.0

  # Storage
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.2.3
  path_provider: ^2.1.4
  # Recs v2 «Моя волна» — event log / cooldowns / кэши похожести (SQLite)
  sqflite: ^2.4.0
  path: ^1.9.0

  # Бэкап/экспорт библиотеки
  file_picker: ^12.0.0-beta.7
  share_plus: ^13.2.0

  # Рендер карточки трека в картинку для «поделиться»
  screenshot: ^3.0.0

  # Уведомления о завершении скачивания
  flutter_local_notifications: ^18.0.1

  # Обновление приложения (проверка релизов + установка APK)
  package_info_plus: ^10.2.0
  open_filex: ^4.5.0

  # Разрешение микрофона для реального визуализатора (Android Visualizer API)
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
