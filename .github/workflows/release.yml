name: Release

# Сборка release-APK и публикация в публичный репозиторий релизов
# (ZenKid-d/roundds-releases), откуда приложение тянет обновления.
#
# Триггеры:
#   • пуш тега вида vX.Y.Z  (git tag v1.5.1 && git push origin v1.5.1)
#   • ручной запуск из вкладки Actions (workflow_dispatch), версия вводится руками
#
# Нужные секреты репозитория (Settings → Secrets and variables → Actions):
#   ANDROID_DEBUG_KEYSTORE_BASE64 — base64 файла ~/.android/debug.keystore
#       (тот же ключ, что и локально: сохраняет SHA-1, вход Google и
#        обновление поверх уже установленных копий).
#         base64 -w0 ~/.android/debug.keystore         # Linux
#   RELEASES_TOKEN — fine-grained PAT с правом Contents: write на
#       репозиторий ZenKid-d/roundds-releases (обычный GITHUB_TOKEN писать в
#       другой репозиторий не может).

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия релиза в формате X.Y.Z (без префикса v)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # полная история + теги для генерации changelog

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Совпадает с локальным окружением (см. SETUP.md). Если версия
          # недоступна — поменяйте на нужную или на channel: stable.
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          if ! echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Версия '$V' не в формате X.Y.Z"; exit 1
          fi
          MAJ=$(echo "$V" | cut -d. -f1)
          MIN=$(echo "$V" | cut -d. -f2)
          PAT=$(echo "$V" | cut -d. -f3)
          # versionCode монотонно растёт вместе с semver и заведомо больше
          # текущего (28), чтобы Android принимал обновление.
          CODE=$((MAJ * 10000 + MIN * 100 + PAT))
          echo "version=$V"      >> "$GITHUB_OUTPUT"
          echo "code=$CODE"      >> "$GITHUB_OUTPUT"
          echo "tag=v$V"         >> "$GITHUB_OUTPUT"
          echo "Version=$V  code=$CODE"

      - name: Restore debug keystore
        env:
          KS: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KS" ]; then
            echo "::error::Секрет ANDROID_DEBUG_KEYSTORE_BASE64 не задан"; exit 1
          fi
          mkdir -p "$HOME/.android"
          echo "$KS" | base64 -d > "$HOME/.android/debug.keystore"

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build release APK
        run: >-
          flutter build apk --release
          --build-name=${{ steps.ver.outputs.version }}
          --build-number=${{ steps.ver.outputs.code }}

      - name: Rename APK
        id: apk
        run: |
          SRC=build/app/outputs/flutter-apk/app-release.apk
          OUT=roundds-${{ steps.ver.outputs.version }}.apk
          cp "$SRC" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Release notes
        run: |
          CUR="${{ steps.ver.outputs.tag }}"
          PREV=$(git tag --list 'v*' --sort=-version:refname | grep -vx "$CUR" | head -n1)
          if [ -n "$PREV" ]; then RANGE="$PREV..HEAD"; else RANGE="HEAD"; fi
          {
            echo "## Roundds ${{ steps.ver.outputs.version }}"
            echo
            git log $RANGE --no-merges --pretty=format:'- %s' | head -n 40
          } > release_notes.md
          cat release_notes.md

      - name: Publish to roundds-releases
        uses: softprops/action-gh-release@v2
        with:
          repository: ZenKid-d/roundds-releases
          token: ${{ secrets.RELEASES_TOKEN }}
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Roundds ${{ steps.ver.outputs.version }}
          body_path: release_notes.md
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
