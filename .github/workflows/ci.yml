name: CI

# Быстрая проверка на каждый push в ветку и на каждый PR: анализатор + тесты.
# Пуши тегов (vX.Y.Z) сюда НЕ попадают — их обрабатывает release.yml.

on:
  push:
    branches:
      - '**'
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Совпадает с release.yml / SETUP.md. Меняется в одном месте при апгрейде.
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
